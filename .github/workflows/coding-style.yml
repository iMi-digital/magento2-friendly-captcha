name: Coding Style
on:
  push:
    branches:
      - master
  pull_request:
    
jobs:
  codingStyle:
    name: "Coding Style"
    runs-on: ubuntu-22.04

    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v6

      - name: "Configure PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1
          tools: composer:v2

      - name: "Install dependencies"
        run: composer install --prefer-dist --no-progress

      - name: "PHPCsFixer"
        run: composer phpcsfixer:check